<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="LX Web 在线音乐播放器 — 基于 lx-music-source 音源" />
  <meta name="theme-color" content="#000000" />
  <title>LX Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=playicon2" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%231DB954'/%3E%3Cpath d='M30 62c12-4 24-6 40-4' stroke='black' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3Cpath d='M28 48c15-5 30-7 46-4' stroke='black' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3Cpath d='M26 35c18-6 36-8 52-4' stroke='black' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M12 1a11 11 0 1 0 0 22 11 11 0 0 0 0-22zm5.1 15.9a.8.8 0 0 1-1.1.3c-3-1.8-6.8-2.2-11.2-1.2a.8.8 0 1 1-.35-1.55c4.8-1.1 9-0.6 12.35 1.35a.8.8 0 0 1 .3 1.1zm1.5-3.3a1 1 0 0 1-1.35.35c-3.45-2.1-8.7-2.7-12.75-1.5a1 1 0 1 1-.55-1.9c4.65-1.35 10.4-.65 14.3 1.75a1 1 0 0 1 .35 1.3zm.15-3.45c-4.15-2.45-11-2.7-14.95-1.5a1.15 1.15 0 1 1-.65-2.2c4.5-1.35 12-1.05 16.7 1.7a1.15 1.15 0 1 1-1.1 2z"/></svg>
        </div>
        <span>LX Web</span>
      </div>

      <nav class="side-nav" aria-label="主导航">
        <button type="button" class="nav-item active" data-view="home" id="navHome">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>首页</span>
        </button>
        <button type="button" class="nav-item" data-view="search" id="navSearch">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <span>搜索</span>
        </button>
        <button type="button" class="nav-item" data-view="library" id="navLibrary">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 10H10V9h8v3zm0-5H10V4h8v3z"/></svg>
          <span>播放列表</span>
        </button>
      </nav>

      <div class="sidebar-card">
        <div class="sidebar-card-title">你的音乐库</div>
        <p class="sidebar-card-desc">搜索歌曲并加入列表，即可在此快速播放。</p>
        <div class="queue-mini" id="queueList"></div>
        <button type="button" class="btn-ghost" id="clearQueue">清空列表</button>
      </div>

      <div class="sidebar-footer">
        <a href="https://github.com/pdone/lx-music-source" target="_blank" rel="noopener">音源 · lx-music-source</a>
      </div>
    </aside>

    <div class="main-wrap">
      <header class="topbar">
        <div class="top-controls">
          <button type="button" class="circle-btn" id="btnBackHist" title="返回" aria-label="返回">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.4 7.4 14 6l-6 6 6 6 1.4-1.4L10.8 12z"/></svg>
          </button>
          <button type="button" class="circle-btn" id="btnFwdHist" title="前进" aria-label="前进" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M10 6 8.6 7.4 13.2 12l-4.6 4.6L10 18l6-6z"/></svg>
          </button>
        </div>

        <form class="search-box" id="searchForm" autocomplete="off">
          <svg class="search-ico" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="search" id="searchInput" name="q" placeholder="想听什么？搜索歌曲、歌手" enterkeyhint="search" required />
        </form>

        <div class="topbar-right">
          <span class="current-source-badge src-tx" id="sourcePill" title="当前搜索音源">QQ音乐</span>
        </div>
      </header>

      <div class="source-bar" aria-label="切换音乐平台">
        <div class="source-bar-inner">
          <div class="source-bar-label">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <span>音乐平台</span>
          </div>
          <div class="source-tabs" id="sourceTabs" role="tablist" aria-label="选择音乐平台">
            <button type="button" class="chip-tab active" data-source="tx" role="tab" aria-selected="true" title="QQ音乐">
              <span class="chip-dot tx"></span>QQ音乐
            </button>
            <button type="button" class="chip-tab" data-source="kw" role="tab" aria-selected="false" title="酷我音乐">
              <span class="chip-dot kw"></span>酷我
            </button>
          </div>
          <p class="source-hint" id="sourceHint">当前：QQ · 点击切换平台后重新搜索</p>
        </div>
      </div>

      <main class="content" id="mainContent">
        <section class="hero" id="heroSection">
          <div class="hero-bg" id="ambientCover"></div>
          <div class="hero-inner">
            <div class="hero-cover-wrap">
              <img id="coverArt" class="hero-cover" alt="封面" src="" />
            </div>
            <div class="hero-meta">
              <span class="hero-type" id="npSource">单曲</span>
              <h1 id="npTitle">欢迎使用 LX Web</h1>
              <p class="hero-sub" id="npArtist">搜索并播放你喜欢的音乐 · 多音源在线解析</p>
              <div class="hero-actions">
                <button type="button" class="btn-green" id="btnHeroPlay" data-playing="false" aria-label="播放">
                  <svg class="hero-ico hero-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
                  <svg class="hero-ico hero-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
                  <span class="hero-play-text">播放</span>
                </button>
                <span class="pill src-tx" id="heroSourcePill">QQ音乐</span>
                <span class="count-badge" id="queueCount">0</span>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <div>
              <h2 id="resultsTitle">精选推荐</h2>
              <p class="section-sub" id="resultsMeta">输入关键词开始搜索，结果会显示在这里</p>
            </div>
          </div>

          <div class="table-head" aria-hidden="true">
            <span class="c-idx">#</span>
            <span class="c-title">标题</span>
            <span class="c-album">专辑</span>
            <span class="c-dur">时长</span>
            <span class="c-act"></span>
          </div>
          <div class="song-list" id="songList"></div>

          <div class="empty-state" id="emptyState">
            <div class="empty-icon">♪</div>
            <h3>开始搜索音乐</h3>
            <p>试试「周杰伦」「海阔天空」，或点击上方切换 QQ / 酷我 平台</p>
          </div>
          <div class="loading" id="loading" hidden style="display:none">
            <div class="spinner"></div>
            <span>正在搜索...</span>
          </div>
        </section>

        <section class="section lyrics-section">
          <h2>歌词</h2>
          <div class="lyrics" id="lyricsBox">
            <div class="lyrics-inner" id="lyricsInner">
              <p class="muted">播放后显示歌词</p>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <footer class="player" id="playerBar">
    <div class="player-left">
      <img id="miniCover" class="player-cover" alt="" />
      <div class="player-meta">
        <div id="miniTitle" class="player-title">未在播放</div>
        <div id="miniArtist" class="player-artist">—</div>
      </div>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button type="button" class="pbtn" id="btnMode" title="顺序播放" aria-label="播放模式">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
        <button type="button" class="pbtn" id="btnPrev" title="上一首" aria-label="上一首">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button type="button" class="pbtn play" id="btnPlay" title="播放" aria-label="播放" data-playing="false">
          <svg class="icon-play" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <button type="button" class="pbtn" id="btnNext" title="下一首" aria-label="下一首">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
        </button>
        <span class="mini-eq" id="miniEq" aria-hidden="true"><i></i><i></i><i></i></span>
      </div>
      <div class="player-timeline">
        <span id="curTime">0:00</span>
        <input type="range" id="seekBar" min="0" max="1000" value="0" aria-label="进度" />
        <span id="durTime">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <label class="quality">
        <select id="qualitySelect" title="音质">
          <option value="128k">标准</option>
          <option value="320k" selected>较高</option>
        </select>
      </label>
      <button type="button" class="pbtn" id="btnMute" title="静音" aria-label="静音">
        <svg class="vol-on" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
        <svg class="vol-off" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" hidden><path d="M16.5 12a4.5 4.5 0 0 0-2.5-4v2.2l2.5 2.5V12zM3 4.3 4.3 3 21 19.7 19.7 21l-3.2-3.2A6.9 6.9 0 0 1 14 19.8v-2.1c.7-.2 1.3-.5 1.9-.9L4.3 7.2 3 8.5V4.3z"/></svg>
      </button>
      <input type="range" id="volBar" min="0" max="100" value="80" aria-label="音量" />
    </div>
  </footer>

  <div class="toast" id="toast" hidden></div>
  <audio id="audio" preload="metadata"></audio>
  <script src="/js/app.js?v=playicon2" type="module"></script>
</body>
</html>
